[project]
name = "sohi-backend"
version = "0.1.0"
description = "Sohi — Social Media & Ads Manager API (FastAPI re-platform)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "sqlmodel>=0.0.16",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "python-dotenv>=1.0",
    "httpx>=0.27",          # Facebook Graph client
    "cryptography>=42.0",   # token encryption at rest
    "stripe>=9.0",          # billing
    "boto3>=1.34",          # S3-compatible media storage (lazy-imported)
    "python-multipart>=0.0.9",  # multipart/form-data (file uploads)
    "arq>=0.26",            # Redis-backed background worker (scheduled posts)
    "sentry-sdk[fastapi]>=2.0",  # optional error tracking (active when SENTRY_DSN set)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
    "ruff>=0.4",
    "mypy>=1.9",
    "pre-commit>=3.7",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["migrations/versions"]  # autogenerated Alembic revisions

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "C4"]
ignore = [
    "B008",  # FastAPI uses function calls (Depends/Query) in defaults
    # Keep typing/datetime 3.9-compatible (portable + locally runnable); 3.11 accepts both.
    "UP006", "UP007", "UP017", "UP035", "UP045",
]

[tool.ruff.lint.per-file-ignores]
"app/core/email_templates.py" = ["E501"]  # inline-styled HTML lines are long by nature

[tool.mypy]
python_version = "3.11"
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
warn_unused_ignores = true

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
